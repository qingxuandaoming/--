<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- 樱花花瓣渐变 -->
    <radialGradient id="petal1" cx="30%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="30%" style="stop-color:#ffdcdc;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#f25477;stop-opacity:0.6" />
    </radialGradient>
    <radialGradient id="petal2" cx="30%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#ffa7a6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ec275f;stop-opacity:0.5" />
    </radialGradient>
    <radialGradient id="petal3" cx="30%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#ffb6c1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d63384;stop-opacity:0.6" />
    </radialGradient>
    <radialGradient id="petal4" cx="30%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.85" />
      <stop offset="30%" style="stop-color:#ffe4e6;stop-opacity:0.75" />
      <stop offset="100%" style="stop-color:#f8a5c2;stop-opacity:0.55" />
    </radialGradient>
    
    <!-- 真实樱花花瓣形状 -->
    <path id="sakuraPetal" d="M0,0 Q-4,-10 0,-15 Q4,-10 0,0 Q3,4 0,10 Q-3,4 0,0 Z" />
    <path id="smallPetal" d="M0,0 Q-2,-6 0,-9 Q2,-6 0,0 Q2,2 0,6 Q-2,2 0,0 Z" />
    <path id="largePetal" d="M0,0 Q-6,-14 0,-20 Q6,-14 0,0 Q4,6 0,14 Q-4,6 0,0 Z" />
  </defs>
  
  <!-- 第一层：大花瓣，慢速飘落 -->
  <g class="layer1">
    <use href="#largePetal" x="100" y="-50" fill="url(#petal1)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 30,200; -20,400; 40,600; -15,800; 25,1000" 
        dur="35s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="0; 60; 120; 180; 240; 300; 360" 
        dur="35s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.7; 0.8; 0.6; 0.4; 0" dur="35s" repeatCount="indefinite" />
    </use>
    
    <use href="#largePetal" x="400" y="-80" fill="url(#petal2)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -25,180; 35,360; -30,540; 45,720; -20,900" 
        dur="40s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="45; 105; 165; 225; 285; 345; 405" 
        dur="40s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.6; 0.7; 0.5; 0.3; 0" dur="40s" repeatCount="indefinite" />
    </use>
    
    <use href="#largePetal" x="800" y="-30" fill="url(#petal3)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 40,220; -35,440; 50,660; -25,880; 35,1100" 
        dur="38s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="90; 150; 210; 270; 330; 390; 450" 
        dur="38s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.8; 0.9; 0.7; 0.5; 0" dur="38s" repeatCount="indefinite" />
    </use>
    
    <use href="#largePetal" x="1100" y="-60" fill="url(#petal4)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -40,190; 30,380; -35,570; 45,760; -30,950" 
        dur="42s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="135; 195; 255; 315; 375; 435; 495" 
        dur="42s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.5; 0.6; 0.4; 0.2; 0" dur="42s" repeatCount="indefinite" />
    </use>
  </g>
  
  <!-- 第二层：中等花瓣，中速飘落 -->
  <g class="layer2">
    <use href="#sakuraPetal" x="200" y="-40" fill="url(#petal1)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 25,150; -15,300; 30,450; -10,600; 20,750" 
        dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="0; 72; 144; 216; 288; 360; 432" 
        dur="28s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.8; 0.9; 0.7; 0.5; 0" dur="28s" repeatCount="indefinite" />
    </use>
    
    <use href="#sakuraPetal" x="500" y="-70" fill="url(#petal2)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -20,140; 25,280; -18,420; 32,560; -15,700" 
        dur="30s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="30; 102; 174; 246; 318; 390; 462" 
        dur="30s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.7; 0.8; 0.6; 0.4; 0" dur="30s" repeatCount="indefinite" />
    </use>
    
    <use href="#sakuraPetal" x="750" y="-20" fill="url(#petal3)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 35,160; -25,320; 40,480; -20,640; 30,800" 
        dur="32s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="60; 132; 204; 276; 348; 420; 492" 
        dur="32s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.6; 0.7; 0.5; 0.3; 0" dur="32s" repeatCount="indefinite" />
    </use>
    
    <use href="#sakuraPetal" x="950" y="-90" fill="url(#petal4)" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -30,170; 28,340; -25,510; 38,680; -22,850" 
        dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="90; 162; 234; 306; 378; 450; 522" 
        dur="26s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.9; 1.0; 0.8; 0.6; 0" dur="26s" repeatCount="indefinite" />
    </use>
    
    <use href="#sakuraPetal" x="300" y="-110" fill="url(#petal1)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 22,130; -18,260; 28,390; -12,520; 25,650" 
        dur="34s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="120; 192; 264; 336; 408; 480; 552" 
        dur="34s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.5; 0.6; 0.4; 0.2; 0" dur="34s" repeatCount="indefinite" />
    </use>
    
    <use href="#sakuraPetal" x="650" y="-50" fill="url(#petal2)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -28,145; 32,290; -26,435; 35,580; -20,725" 
        dur="29s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="150; 222; 294; 366; 438; 510; 582" 
        dur="29s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.8; 0.9; 0.7; 0.5; 0" dur="29s" repeatCount="indefinite" />
    </use>
  </g>
  
  <!-- 第三层：小花瓣，快速飘落 -->
  <g class="layer3">
    <use href="#smallPetal" x="150" y="-30" fill="url(#petal1)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 15,100; -8,200; 18,300; -5,400; 12,500" 
        dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="0; 90; 180; 270; 360; 450; 540" 
        dur="20s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.6; 0.7; 0.5; 0.3; 0" dur="20s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="350" y="-60" fill="url(#petal2)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -12,90; 15,180; -10,270; 18,360; -8,450" 
        dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="45; 135; 225; 315; 405; 495; 585" 
        dur="22s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.7; 0.8; 0.6; 0.4; 0" dur="22s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="550" y="-20" fill="url(#petal3)" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 20,110; -15,220; 22,330; -12,440; 18,550" 
        dur="24s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="90; 180; 270; 360; 450; 540; 630" 
        dur="24s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.5; 0.6; 0.4; 0.2; 0" dur="24s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="850" y="-80" fill="url(#petal4)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -18,95; 22,190; -16,285; 25,380; -14,475" 
        dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="135; 225; 315; 405; 495; 585; 675" 
        dur="18s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.8; 0.9; 0.7; 0.5; 0" dur="18s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="1050" y="-40" fill="url(#petal1)" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 25,105; -20,210; 28,315; -18,420; 22,525" 
        dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="180; 270; 360; 450; 540; 630; 720" 
        dur="25s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.4; 0.5; 0.3; 0.1; 0" dur="25s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="450" y="-100" fill="url(#petal2)" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -22,85; 26,170; -20,255; 30,340; -16,425" 
        dur="21s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="225; 315; 405; 495; 585; 675; 765" 
        dur="21s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.9; 1.0; 0.8; 0.6; 0" dur="21s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="750" y="-70" fill="url(#petal3)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 16,92; -14,184; 20,276; -10,368; 15,460" 
        dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="270; 360; 450; 540; 630; 720; 810" 
        dur="23s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.6; 0.7; 0.5; 0.3; 0" dur="23s" repeatCount="indefinite" />
    </use>
    
    <use href="#smallPetal" x="250" y="-90" fill="url(#petal4)" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; -16,88; 19,176; -12,264; 22,352; -9,440" 
        dur="19s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" 
        values="315; 405; 495; 585; 675; 765; 855" 
        dur="19s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0; 0.7; 0.8; 0.6; 0.4; 0" dur="19s" repeatCount="indefinite" />
    </use>
  </g>
</svg>