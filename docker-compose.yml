version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cycling_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ljxz
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 将初始化脚本挂载到 docker-entrypoint-initdb.d 目录下，容器首次启动会自动执行
      - ./database/complete_init.sql:/docker-entrypoint-initdb.d/complete_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cycling_network
    deploy:
      resources:
        limits:
          memory: 512M

  java-backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    container_name: cycling_java_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ljxz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cycling_network
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: cycling_python_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:123456@mysql:3306/ljxz
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=ljxz
      - TZ=Asia/Shanghai
      - CHROME_BINARY_PATH=/usr/bin/google-chrome
      - CHROMEDRIVER_PATH=/usr/local/bin/chromedriver
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cycling_network
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vue-frontend:
    build:
      context: ./vue-cycling-app
      dockerfile: Dockerfile
    container_name: cycling_vue_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - java-backend
      - python-backend
    networks:
      - cycling_network
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:

networks:
  cycling_network:
    driver: bridge
