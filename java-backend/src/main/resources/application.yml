# 高德地图API配置
amap:
  # Web服务API Key
  web-api-key: 4b19117847fdee44a92d547edb7ab8c1
  # Web端JS API Key
  js-api-key: cc888f3fbd2b5c82cb3b842d8277c241
  # 安全密钥
  security-key: 045a4882fc3282b9bf01d689b11a06d7
  # API基础URL
  base-url: https://restapi.amap.com/v3
  # 请求超时时间(毫秒)
  timeout: 10000
  # 重试次数
  retry-count: 3

# JWT配置
jwt:
  secret: ljxz-cycling-route-secret-key-2024
  expiration: 86400000  # 24小时(毫秒)
  refresh-expiration: 604800000  # 7天(毫秒)

# 安全配置
security:
  # 不需要认证的路径
  permit-all:
    - /auth/**
    - /public/**
    - /health
    - /route/health
    - /test
    - /tables
    - /cycling-routes/**
    - /feedback/**
    - /actuator/**
    - /swagger-ui/**
    - /v3/api-docs/**

# 路径规划配置
route:
  # 默认城市
  default-city: 石家庄
  # 最大路径点数
  max-waypoints: 16
  # 缓存过期时间(分钟)
  cache-expire-minutes: 30
  # 支持的交通方式
  transport-modes:
    - driving    # 驾车
    - walking    # 步行
    - transit    # 公交
    - riding     # 骑行

# 日志配置
logging:
  level:
    com.ljxz.cycling: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cycling-route.log
    max-size: 10MB
    max-history: 30

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true